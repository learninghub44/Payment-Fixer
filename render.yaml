services:
  # Backend API Service
  - type: web
    name: kuwesa-payment-api
    runtime: node
    plan: free
    buildCommand: cd artifacts/api-server && chmod +x build.sh && ./build.sh
    startCommand: cd artifacts/api-server && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
    healthCheckPath: /api/healthz

  # Frontend Service
  - type: web
    name: kuwesa-payment-frontend
    runtime: static
    plan: free
    buildCommand: cd artifacts/relationships && npm install && npm run build
    staticPublishPath: artifacts/relationships/dist/public
    envVars:
      - key: VITE_API_URL
        value: https://kuwesa-payment-api.onrender.com/api
    routes:
      - type: rewrite
        source: /api/*
        destination: https://kuwesa-payment-api.onrender.com/api/*
      - type: file
        source: /**
        destination: /index.html
